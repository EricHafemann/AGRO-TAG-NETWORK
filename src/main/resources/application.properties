# SERVER
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# DATABASE (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/agro_tag_network?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conex§es (Hikari)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}
spring.datasource.hikari.idle-timeout=30000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# SECURITY
spring.security.user.name=${SECURITY_USER:}
spring.security.user.password=${SECURITY_PASS:}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=${JWT_ISSUER:agro-tag-api}

# LOGGING
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG

# JACKSON
spring.jackson.serialization.indent_output=true
spring.jackson.default-property-inclusion=non_null

# ACTUATOR
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,DELETE